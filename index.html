<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DATACENTER VPTX - Professional AI Work Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Roboto"', 'sans-serif'],
            },
            colors: {
              primary: {
                50: '#f1f8f6',
                100: '#dcece7',
                200: '#bdd9d1',
                300: '#90bab0',
                400: '#649688',
                500: '#43786a',
                600: '#326055',
                700: '#284d44',
                800: '#223f38',
                900: '#154d3c', // Màu xanh đậm chủ đạo theo yêu cầu
              }
            },
            borderRadius: {
              'xl': '1rem',
              '2xl': '1.5rem',
              '3xl': '2.5rem',
            }
          },
        },
      }
    </script>
    <style>
      :root {
        --glass-bg: rgba(255, 255, 255, 0.94);
        --glass-border: rgba(255, 255, 255, 0.6);
        --primary-dark: #154d3c;
      }

      body {
        font-family: 'Roboto', sans-serif;
        background-color: #f8fafc;
        min-height: 100vh;
        margin: 0;
        color: #1e293b;
        font-size: 16px; /* Kích thước chuẩn */
      }

      /* Hình nền chuyên nghiệp - Gradient tinh tế trắng + xanh nhạt */
      .bg-pro-modern {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: -1;
        background: 
          radial-gradient(circle at 20% 30%, rgba(21, 77, 60, 0.04) 0%, transparent 50%),
          radial-gradient(circle at 80% 70%, rgba(21, 77, 60, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 50% 50%, rgba(21, 77, 60, 0.02) 0%, transparent 70%),
          linear-gradient(135deg, #ffffff 0%, #f5faf8 40%, #eff6f3 100%);
        background-attachment: fixed;
      }

      .mica {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
      }

      .card-premium {
        background: white;
        border: 1px solid rgba(0, 0, 0, 0.06);
        box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        transition: all 0.3s ease;
      }
      
      .card-premium:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 30px -5px rgba(21, 77, 60, 0.1);
        border-color: rgba(21, 77, 60, 0.15);
      }

      .btn-primary-dark {
        background-color: var(--primary-dark);
        color: white;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .btn-primary-dark:hover {
        background-color: #0e3529;
        transform: translateY(-1px);
        box-shadow: 0 10px 15px -3px rgba(21, 77, 60, 0.3);
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }

      /* Scrollbar tinh tế */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #154d3c;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
      }
    }
    </script>
  </head>
  <body>
    <div class="bg-pro-modern"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
